# nginx config baked into the frontend Docker image.
#   - Serves the Vite SPA from /usr/share/nginx/html
#   - Reverse-proxies /api/* and /socket.io/* to the `backend` service on the
#     internal docker network (Compose DNS resolves "backend" → container IP).
#   - Falls back to index.html for any unknown route so client-side routes
#     (react-router) survive a page refresh.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Firmware uploads can be a few MB. nginx default of 1 MB is too small.
    client_max_body_size 16M;

    # API + WebSocket → backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 24h;
    }

    # SPA fallback — anything not matched above gets index.html so the
    # client-side router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets aggressively (Vite gives them hashed filenames).
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}

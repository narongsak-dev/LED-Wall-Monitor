# Drop-in nginx server block for the LED Wall Monitor stack.
#
# Install on the host as /etc/nginx/sites-available/monitor and symlink:
#   sudo ln -s /etc/nginx/sites-available/monitor /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Coexists with the existing `bfouroa` site — both share port 80 / 443 and
# are routed by the Host header, so the existing site is not affected.
#
# When a TLS cert is ready, run `sudo certbot --nginx -d monitor.dragontrusts.com`
# and certbot will rewrite this block to redirect 80 → 443 automatically.

server {
    listen 80;
    listen [::]:80;
    server_name monitor.dragontrusts.com;

    # Upload size cap (board firmware images are small but cert PEMs etc.
    # come through here too).
    client_max_body_size 5m;

    # API + WebSocket → backend container
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 24h;
    }

    # SPA static files → frontend container
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# Host nginx vhost for the LED Wall Monitor stack.
#
# Install on the host as /etc/nginx/sites-available/ledmonitor and
# enable:
#   sudo ln -s /etc/nginx/sites-available/ledmonitor /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# This is a transparent reverse proxy — everything (SPA, /api, /socket.io)
# goes to 127.0.0.1:8081, where the container's own nginx-spa.conf does
# the path-level routing (SPA fallback, proxy to backend, websocket
# upgrade). Keeping host nginx "dumb" means a single config that handles
# any number of vhosts identically.
#
# WebSocket: the `map $http_upgrade` block at the top is what makes
# socket.io traverse this proxy.
#
# To add another domain (e.g. monitor.dragontrusts.com), just copy the
# named server block and change server_name. To add TLS:
#   sudo certbot --nginx -d new.domain.example
# certbot rewrites the matching server block, adds a 443 block, and
# enables a 80 → 443 redirect.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# si-pledwall.successit.co.th — certbot owns this block's 443 mirror.
server {
    listen 80;
    server_name si-pledwall.successit.co.th;

    client_max_body_size 16M;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 24h;
    }
}

# Catch-all for any other host header (raw IP from LAN, other domains
# not yet covered above, etc.). Plain HTTP only — add a named server
# block above + run certbot when a domain needs TLS.
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 16M;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 24h;
    }
}
